name: Release Calculator App

on:
  push:
    tags:
      - 'v*'
  # Memungkinkan Anda menjalankan ini secara manual melalui tombol di GitHub
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        # Mesin cloud yang akan disewa (gratis) oleh GitHub untuk merakit aplikasi Anda
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Linux butuh library ekstra untuk merakit antarmuka desktop
      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      # Skrip resmi Tauri untuk membangun installer dan menaruhnya di GitHub Releases
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Calculator v__VERSION__'
          releaseBody: 'Rilis terbaru Calculator App dengan Natural Textbook Display.'
          releaseDraft: true
          prerelease: false
